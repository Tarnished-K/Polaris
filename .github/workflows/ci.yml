name: Validate application

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, build, and validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production assets
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Check Lighthouse and asset-size budgets
        run: npm run audit:lighthouse

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Lighthouse result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-result
          path: lighthouse-results.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate database migrations and core flow
        run: npm run backend:validate

      # `npm run backend:lint` requires a running Docker-backed local Supabase
      # database, so it remains part of the separate real-Postgres validation.
